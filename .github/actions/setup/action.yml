# this is composite workflow that gets the repo ready for actions
# for docs how composite workflows work see https://wallis.dev/blog/composite-github-actions

name: Setup repository
description: Sets this repository up to allow efficient run of various github actions

runs:
  using: composite
  steps:
    - name: Install package manager via corepack
      run: |
        npm install -g corepack@v0.31.0
        corepack enable
      shell: bash

    - name: Cache pnpm store
      uses: actions/setup-node@v4
      with:
        # Pin to .nvmrc (single version) instead of the package.json `engines`
        # range. A range lets setup-node float to the latest available Node,
        # which after the 2026-06-18 security batch is a poisoned release
        # (24.17.0 / 26.3.1) that makes node-fetch@2 throw a false
        # ERR_STREAM_PREMATURE_CLOSE — breaking `changeset version`'s GitHub
        # GraphQL changelog fetch. See nodejs/node#63989.
        node-version-file: .nvmrc
        registry-url: https://npm.pkg.github.com/
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        npm config set "//npm.pkg.github.com/:_authToken" "$GITHUB_TOKEN"
        pnpm install --frozen-lockfile

    - name: Install Playwright
      shell: bash
      run: |
        npx playwright install

    - name: Setup turborepo cache
      uses: rharkor/caching-for-turbo@v1.5
